<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>登録 | UNITE Friend Challenge</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#151a3a" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="no-tabbar">
<div class="app-shell">

  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="topbar-back">← 戻る</a>
      <div class="brand" style="font-size:0.85rem;">登録</div>
      <span style="width:40px;"></span>
    </div>
  </header>

  <main class="section container">
    <div class="eyebrow">Step 1 / 3</div>
    <h1 style="font-size:1.5rem;">まずはあなたのことを<br/>教えてください</h1>
    <p class="hero-sub">難しく考えなくて大丈夫。ここで入力した情報は、チャレンジとグループづくりのためだけに使います。</p>

    <form id="registerForm" style="margin-top:24px;">
      <div class="field">
        <label for="name">名前</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="field">
        <label for="nickname">ニックネーム</label>
        <input type="text" id="nickname" name="nickname" required />
        <div class="hint">グループやDiscordではこちらの呼び名を使います。</div>
      </div>
      <div class="field">
        <label for="age">年齢</label>
        <input type="number" id="age" name="age" min="10" max="99" required />
      </div>
      <div class="field">
        <label for="ageRange">年代</label>
        <select id="ageRange" name="ageRange" required>
          <option value="" disabled selected>選択してください</option>
        </select>
      </div>
      <div class="field">
        <label>性別</label>
        <div class="radio-pill-group" id="genderOptions"></div>
      </div>
      <div class="field">
        <label for="church">所属教会</label>
        <input type="text" id="church" name="church" placeholder="例：〇〇教会" required />
      </div>
      <div class="field">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="field">
        <label for="discordId">Discord ID</label>
        <input type="text" id="discordId" name="discordId" placeholder="例：yourname#1234 または @yourname" />
        <div class="hint">まだ持っていない場合は空欄でOK。あとから登録できます。</div>
      </div>

      <div class="notice-box" style="margin: 22px 0;">
        <strong>祈っている友達について</strong>
        <ul>
          <li>ここに書く名前は、あなたの祈りリストとして扱われます。</li>
          <li>公開されません。他の参加者には見えません。</li>
          <li>無理に本名を書かなくても大丈夫です（ニックネームやイニシャルでもOK）。</li>
          <li>プライバシーを大切にしています。</li>
        </ul>
      </div>

      <div class="field">
        <label for="friend1">祈っている友達 1人目</label>
        <input type="text" id="friend1" name="friend1" placeholder="名前 / ニックネーム" />
      </div>
      <div class="field">
        <label for="friend2">祈っている友達 2人目</label>
        <input type="text" id="friend2" name="friend2" placeholder="名前 / ニックネーム" />
      </div>
      <div class="field">
        <label for="friend3">祈っている友達 3人目</label>
        <input type="text" id="friend3" name="friend3" placeholder="名前 / ニックネーム" />
      </div>

      <button type="submit" class="btn btn-accent" style="margin-top:8px;">次へ：ミッション診断へ</button>
    </form>
  </main>
</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/register.js"></script>
</body>
</html>
